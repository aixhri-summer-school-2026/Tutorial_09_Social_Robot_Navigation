services:
  visualizer:
    image: ros-humble-socnav
    container_name: visualize
    privileged: true
    network_mode: host
    ipc: host
    tty: true
    stdin_open: true
    user: "0:0" # Ensures root access for groupadd/useradd

    command: bash -c "source /opt/ros/humble/setup.bash && if [ -f MPPI/install/setup.bash ]; then source MPPI/install/setup.bash; fi && python3 MPPI/src/socnav_tutorial/scripts/visualize.py "

    environment:
      - TERM=xterm-256color
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - TURTLEBOT3_MODEL=waffle
      - GAZEBO_MODEL_PATH=/usr/share/gazebo-11/models:/opt/ros/humble/share/turtlebot3_gazebo/models
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp


    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /dev/dri:/dev/dri:ro
      - ${HOME}:${HOME}
      - ./ros2_ws:/home/nav2-socnav
    
    working_dir: /home/nav2-socnav

    entrypoint: []

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  human_publisher:
      image: ros-humble-socnav
      container_name: humans_pub
      privileged: true
      network_mode: host
      ipc: host
      tty: true
      stdin_open: true
      user: "0:0" # Ensures root access for groupadd/useradd

      command: bash -c "source /opt/ros/humble/setup.bash && if [ -f MPPI/install/setup.bash ]; then source MPPI/install/setup.bash; fi && python3 MPPI/src/socnav_tutorial/scripts/publish_tracked_agents.py"

      environment:
        - TERM=xterm-256color
        - DISPLAY=${DISPLAY}
        - NVIDIA_DRIVER_CAPABILITIES=all
        - ROS_DOMAIN_ID=0
        - ROS_LOCALHOST_ONLY=0
        - TURTLEBOT3_MODEL=waffle
        - GAZEBO_MODEL_PATH=/usr/share/gazebo-11/models:/opt/ros/humble/share/turtlebot3_gazebo/models
        - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp


      volumes:
        - /tmp/.X11-unix:/tmp/.X11-unix:ro
        - /dev/dri:/dev/dri:ro
        - ${HOME}:${HOME}
        - ./ros2_ws:/home/nav2-socnav
      
      working_dir: /home/nav2-socnav

      entrypoint: []

      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]


    